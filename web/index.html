<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>FlowQueue — Durable message queues with fan-out, replay & webhooks</title>
    <meta
      name="description"
      content="FlowQueue is a Postgres-backed message processing platform: durable queues, per-consumer delivery lifecycle, fan-out to many consumers, conditional webhooks, replay and a tamper-evident audit log. Free during beta."
    />
    <meta property="og:title" content="FlowQueue" />
    <meta
      property="og:description"
      content="Durable message queues with fan-out, replay & webhooks. Free during beta."
    />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme before React mounts to avoid a flash of the wrong theme.
      (function () {
        try {
          var t = localStorage.getItem("fq-theme") || "dark";
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
