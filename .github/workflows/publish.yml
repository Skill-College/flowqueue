name: Publish flowqueue SDK to PyPI

# Publishes ./sdk (the `flowqueue` client package) to PyPI via Trusted Publishing
# (OIDC — no API tokens stored). Trigger by creating a GitHub Release whose tag
# starts with `sdk-v` (e.g. sdk-v0.1.0).

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    if: startsWith(github.event.release.tag_name, 'sdk-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: sdk
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check artifacts
        working-directory: sdk
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: sdk/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No username/password: PyPI Trusted Publisher (OIDC) authenticates this repo.
